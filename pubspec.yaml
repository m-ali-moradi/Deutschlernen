name: deutschmate_mobile
description: Flutter implementation of DeutschMate with SQLite + Drift.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.8.1
  drift: 2.31.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  url_launcher: ^6.3.2
  flutter_tts: ^4.0.2
  freezed_annotation: any
  json_annotation: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  drift_dev: 2.31.0
  flutter_launcher_icons: ^0.13.1
  freezed: any
  json_serializable: any
  flutter_driver:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21



flutter:
  uses-material-design: true
  assets:
    - assets/content/vocabulary/misc.json
    - assets/content/vocabulary/groups.json
    - assets/content/vocabulary/categories.json
    - assets/content/vocabulary/A1/
    - assets/content/vocabulary/A2/
    - assets/content/vocabulary/B1/
    - assets/content/vocabulary/B2/
    - assets/content/exercises/A1/
    - assets/content/exercises/A2/
    - assets/content/exercises/B1/
    - assets/content/exercises/B2/
    - assets/content/exercises/C1/
    - assets/content/grammar/A1/
    - assets/content/grammar/A2/
    - assets/content/grammar/B1/
    - assets/content/grammar/B2/
    - assets/content/grammar/C1/
    - assets/content/phrases/
    - assets/content/achievements/
    - assets/content/exams/en/
    - assets/content/exams/de/
    - assets/content/dialogues/
    - assets/images/icon.png
    - assets/images/logo.png
